{{ $id := .id }}
{{ $type := .type }}
{{ $imageUrl := .imageUrl | default "" }}
{{ $videoUrl := .videoUrl | default "" }}
{{ $videoType := .videoType | default "" }}

<div class="ig-interactions" id="interactions-{{ $id }}">
  <!-- Action Buttons -->
  <div class="ig-interactions__buttons">
    <div class="ig-interactions__left">
      <!-- Like / Heart -->
      <div class="ig-like-wrapper" id="like-wrapper-{{ $id }}">
        <button class="ig-action-btn" id="like-btn-{{ $id }}" data-content-id="{{ $id }}" aria-label="Like" title="Like">
          <span class="ig-heart-outline">{{ partial "icons.html" (dict "icon" "heart" "size" "24") }}</span>
          <span class="ig-heart-filled" style="display:none;">{{ partial "icons.html" (dict "icon" "heart-filled" "size" "24") }}</span>
        </button>
      </div>
      <!-- Comment -->
      <button class="ig-action-btn" id="comment-btn-{{ $id }}" onclick="toggleComments('{{ $id }}')" aria-label="Comment" title="Comment">
        {{ partial "icons.html" (dict "icon" "comment" "size" "24") }}
      </button>
      <!-- Share -->
      <button class="ig-action-btn" id="share-btn-{{ $id }}" onclick="shareContent('{{ .context.Permalink }}'); event.stopPropagation();" aria-label="Share" title="Share">
        {{ partial "icons.html" (dict "icon" "share" "size" "24") }}
      </button>
    </div>
  </div>

  <!-- Like Count -->
  <div class="ig-interactions__likes" id="like-section-{{ $id }}">
    <span class="ig-interactions__like-count" id="like-count-{{ $id }}" onclick="showReactionsModal('{{ $id }}')" style="cursor:pointer;">0 likes</span>
  </div>

  <!-- Comments Section -->
  <div class="ig-comments" id="comments-{{ $id }}">
    <button class="ig-comments__view-all" id="view-comments-btn-{{ $id }}" onclick="toggleComments('{{ $id }}')" style="display:none;">
      View all <span id="comment-count-{{ $id }}">0</span> comments
    </button>
    <div class="ig-comments__list" id="comment-list-{{ $id }}"></div>
    <div class="ig-comments__add">
      <input 
        type="text" 
        class="ig-comments__input" 
        placeholder="Add a comment..." 
        id="comment-input-{{ $id }}"
        onkeypress="if(event.key==='Enter') addComment('{{ $id }}')"
      >
      <button class="ig-comments__post-btn" onclick="addComment('{{ $id }}')" style="display:none;" id="comment-post-btn-{{ $id }}">Post</button>
    </div>
  </div>

  <!-- Share Tooltip -->
  <div class="ig-share-tooltip" id="share-tooltip-{{ $id }}">
    Link copied!
  </div>

  <!-- Double-tap heart animation overlay -->
  <div class="ig-double-tap-heart" id="double-tap-heart-{{ $id }}" style="display:none;">
    {{ partial "icons.html" (dict "icon" "heart-filled" "size" "80") }}
  </div>
</div>

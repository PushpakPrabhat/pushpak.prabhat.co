<div class="feed-tabs" id="feed-tabs" role="tablist">
  <span class="feed-tabs__label">All activity</span>
  <button class="feed-tab feed-tab--active" data-tab="all" role="tab" aria-selected="true" id="tab-all">All</button>
  <button class="feed-tab" data-tab="photos" role="tab" aria-selected="false" id="tab-photos">Photos</button>
  <button class="feed-tab" data-tab="videos" role="tab" aria-selected="false" id="tab-videos">Videos</button>
  <button class="feed-tab" data-tab="posts" role="tab" aria-selected="false" id="tab-posts">Posts</button>
</div>

<!-- Photo Categories -->
<div class="category-filter" id="photo-categories" role="group" aria-label="Photo categories">
  <button class="category-chip category-chip--active" data-category="all-photos">All Photos</button>
  <button class="category-chip" data-category="sketches">Sketches</button>
  <button class="category-chip" data-category="digital-paintings">Digital Paintings</button>
  <button class="category-chip" data-category="illustrations">Illustrations</button>
  <button class="category-chip" data-category="ui-ux">UI/UX</button>
</div>

<!-- Video Categories -->
<div class="category-filter" id="video-categories" role="group" aria-label="Video categories">
  <button class="category-chip category-chip--active" data-category="all-videos">All Videos</button>
  <button class="category-chip" data-category="promotional">Promotional Videos</button>
  <button class="category-chip" data-category="motion-graphics">Motion Graphics</button>
  <button class="category-chip" data-category="3d-animation">3D Animation</button>
  <button class="category-chip" data-category="2d-animation">2D Animation</button>
  <button class="category-chip" data-category="motion-posters">Motion Posters</button>
  <button class="category-chip" data-category="shorts-reels">Shorts / Reels</button>
</div>

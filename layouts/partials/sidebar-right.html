{{ $profile := .Site.Data.profile }}
<aside class="layout__sidebar-right" id="sidebar-right">
  <!-- Skills Widget -->
  <div class="sidebar-widget">
    <h3 class="sidebar-widget__title">Skills</h3>
    <div class="interests-grid" style="padding-top: 8px;">
      {{ range $profile.skills }}
      <span class="interest-tag">
        <span class="interest-tag__icon">
          {{ if .icon }}
          <img src="{{ .icon }}" alt="Icon" style="width:16px;height:16px;object-fit:contain;border-radius:2px;">
          {{ else }}
          ⚡
          {{ end }}
        </span>
        {{ .name }}
      </span>
      {{ end }}
    </div>
  </div>
  
  <!-- Quick Links -->
  <div class="sidebar-widget">
    <h3 class="sidebar-widget__title">Quick Links</h3>
    {{ range $profile.quickLinks }}
    <div class="sidebar-widget__item">
      <span class="sidebar-widget__item-icon">
        {{ if .icon }}
        <img src="{{ .icon }}" alt="{{ .title }}" style="width:24px;height:24px;object-fit:contain;border-radius:4px;">
        {{ else }}
        <span style="font-size: 20px; display: inline-block; width: 24px; text-align: center;">🔗</span>
        {{ end }}
      </span>
      <div>
        <a href="{{ .url }}" target="_blank" rel="noopener" class="sidebar-widget__item-text">{{ .title }}</a>
      </div>
    </div>
    {{ end }}
  </div>
  
  <!-- Footer -->
  {{ partial "footer.html" . }}
</aside>

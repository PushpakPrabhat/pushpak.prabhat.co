{{ define "main" }}
<div class="layout">
  <div class="layout__sidebar-left">
    {{ partial "profile-card.html" . }}
  </div>
  <div class="layout__main">
    {{ partial "feed-tabs.html" . }}
    <div id="feed-items">
      {{ range .Pages }}
      <div class="feed-item" style="opacity:1; padding: 16px;">
        <a href="{{ .Permalink }}" style="font-weight: 600;">{{ .Title }}</a>
        <span style="color: #666; font-size: 0.8rem; margin-left: 8px;">{{ .Pages | len }} items</span>
      </div>
      {{ end }}
    </div>
  </div>
  {{ partial "sidebar-right.html" . }}
</div>
{{ end }}
